version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: dockerFile
    container_name: laravel_app
    volumes:
      - /var/lib/jenkins/workspace/real_pipeline_project:/var/www/html
      - /var/www/project/.env.example:/var/www/html/.env
    working_dir: /var/www/html
    networks:
      - laravel_net

  web:
    image: nginx:latest
    container_name: laravel_nginx
    ports:
      - "8082:80"
    volumes:
      - ./:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - laravel_net

  db:
    image: mysql:8.0
    container_name: laravel_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: laravel
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - laravel_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "--host=localhost", "--user=root", "--password=root"]
      interval: 30s
      retries: 5
      start_period: 30s
      timeout: 10s

volumes:
  db_data:

networks:
  laravel_net:
    driver: bridge

